<!DOCTYPE html>
<html>
<head>
<title>FFT Image Compressor</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">
</head>

<body>

<h1>Image Compressor using FFT</h1>

<input type="file" id="upload">

<br><br>

<label>Compression Level</label>
<input type="range" id="compression" min="1" max="50" value="10">

<br><br>

<div class="container">

<div>
<h3>Original</h3>
<canvas id="original"></canvas>
</div>

<div>
<h3>Compressed</h3>
<canvas id="compressed"></canvas>
</div>

</div>

<br>

<button id="download">Download Compressed Image</button>

<script src="script.js"></script>

</body>
</html>
